<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ByteDance DCS Cloud SRE Interview Preparation Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon">T</div>
        <h1 class="logo-text">TikTok Prep</h1>
      </div>
      
      <div class="search-box">
        <div class="search-input-wrapper">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input type="text" id="searchInput" placeholder="Search questions & code...">
        </div>
      </div>
      
      <nav class="nav-menu" id="navMenu">
        <!-- Dynamic sidebar menu items rendered by app.js -->
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content" id="mainContent">
      <header class="main-header">
        <div class="header-left">
          <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation Menu">
            <i class="fa-solid fa-bars"></i>
          </button>
          
          <nav class="top-nav-tabs" id="topNavTabs" style="display: flex; gap: 6px; flex-wrap: wrap; overflow-x: auto; padding-bottom: 4px; border-bottom: 0;">
            <button class="top-tab-btn active" data-category="Dashboard"><i class="fa-solid fa-chart-line" style="margin-right:4px;"></i> Dashboard</button>
            <button class="top-tab-btn" data-category="Behavioral">Behavioral</button>
            <button class="top-tab-btn" data-category="Linux">Linux</button>
            <button class="top-tab-btn" data-category="Networking">Networking</button>
            <button class="top-tab-btn" data-category="Cloud">Cloud</button>
            <button class="top-tab-btn" data-category="Kubernetes">Kubernetes</button>
            <button class="top-tab-btn" data-category="GPU & AI Infrastructure">GPU & AI Infrastructure</button>
            <button class="top-tab-btn" data-category="Coding">Coding</button>
            <button class="top-tab-btn" data-category="System Design">System Design</button>
          </nav>
        </div>
        
        <div class="header-controls">
          <!-- Quick Recall Flashcard Mode -->
          <label class="control-switch" title="Toggle full screen flashcard mode for last-minute review.">
            <span>Quick Recall</span>
            <input type="checkbox" id="quickRecallToggle">
            <div class="switch-track">
              <div class="switch-thumb"></div>
            </div>
          </label>

          <!-- Active Recall Mode Toggle -->
          <label class="control-switch" title="Hides answers by default. Click elements to reveal them.">
            <span>Recall Mode</span>
            <input type="checkbox" id="activeRecallToggle">
            <div class="switch-track">
              <div class="switch-thumb"></div>
            </div>
          </label>
          
          <!-- Dark/Light Theme Toggle -->
          <label class="control-switch" title="Toggle between Dark and Light mode.">
            <span>Light Mode</span>
            <input type="checkbox" id="themeToggle">
            <div class="switch-track">
              <div class="switch-thumb"></div>
            </div>
          </label>
        </div>
      </header>
      
      <!-- Content Body -->
      <div class="content-body" id="contentArea">
        <!-- Dynamic study cards rendered by app.js -->
      </div>
    </main>
  </div>

  <!-- Data & Behavior Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
